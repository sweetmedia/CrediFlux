services:
  web:
    image: python:3.11-slim
    container_name: django-ledger-web
    restart: unless-stopped
    ports:
      - "3640:8000"
    volumes:
      - django_ledger_starter_app:/app
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        apt-get update
        apt-get install -y --no-install-recommends git gcc build-essential
        rm -rf /var/lib/apt/lists/*
        if [ ! -f /app/manage.py ]; then
          git clone --depth 1 https://github.com/arrobalytics/django-ledger-starter.git /app
        fi
        cd /app
        python -m pip install --no-cache-dir -U pip
        python -m pip install --no-cache-dir Django==5.0.1 django-ledger==0.5.5.5 Faker
        sed -i 's/ALLOWED_HOSTS = \[\]/ALLOWED_HOSTS = ["*"]/g' django_ledger_starter/settings.py
        python manage.py migrate
        python manage.py shell -c "from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username='demoadmin').exists() or U.objects.create_superuser('demoadmin','demo@example.com','demo2026')"
        python manage.py runserver 0.0.0.0:8000

volumes:
  django_ledger_starter_app:
