services:
  web:
    image: python:3.11-slim
    container_name: django-ledger-web
    restart: unless-stopped
    ports:
      - "3640:8000"
    volumes:
      - django_ledger_starter_app:/app
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        apt-get update
        apt-get install -y --no-install-recommends git gcc build-essential
        rm -rf /var/lib/apt/lists/*
        if [ ! -f /app/manage.py ]; then
          git clone --depth 1 https://github.com/arrobalytics/django-ledger-starter.git /app
        fi
        cd /app
        python -m pip install --no-cache-dir -U pip
        python -m pip install --no-cache-dir Django==5.0.1 django-ledger==0.5.5.5 Faker
        sed -i 's/ALLOWED_HOSTS = \[\]/ALLOWED_HOSTS = ["*"]/g' django_ledger_starter/settings.py
        python manage.py migrate
        python manage.py shell -c "from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username='demoadmin').exists() or U.objects.create_superuser('demoadmin','demo@example.com','demo2026')"
        cat >/tmp/seed_rd_demo.py <<'PY'
        from decimal import Decimal
        from datetime import timedelta
        from django.contrib.auth import get_user_model
        from django.utils import timezone
        from django_ledger.models import EntityModel, TransactionModel
        from django_ledger.io.io_generator import EntityDataGenerator
        from django_ledger.io.roles import (
            ASSET_CA_CASH,
            ASSET_CA_RECEIVABLES,
            LIABILITY_CL_OTHER,
            LIABILITY_CL_ACC_PAYABLE,
            EQUITY_CAPITAL,
            INCOME_INTEREST,
            EXPENSE_OPERATIONAL,
            DEBIT,
            CREDIT,
        )

        User = get_user_model()
        user = User.objects.get(username='demoadmin')
        entity_name = 'Cooperativa La Vega Demo'
        entity = EntityModel.objects.filter(name=entity_name).first()

        if not entity:
            entity = EntityModel.create_entity(
                name=entity_name,
                use_accrual_method=True,
                admin=user,
                fy_start_month=1,
            )

        entity.address_1 = 'Av. Pedro A. Rivera 45'
        entity.city = 'La Vega'
        entity.state = 'La Vega'
        entity.zip_code = '41000'
        entity.country = 'DO'
        entity.email = 'demo@coop-lavega.do'
        entity.phone = '8095550101'
        entity.website = 'https://coop-lavega.do'
        entity.save()

        tx_count = TransactionModel.objects.for_entity(entity_model=entity).count()
        if tx_count == 0:
            gen = EntityDataGenerator(
                user_model=user,
                entity_model=entity,
                start_dttm=timezone.now() - timedelta(days=220),
                capital_contribution=Decimal('3500000.00'),
                days_forward=180,
                tx_quantity=8,
            )
            gen.COUNTRY = 'DO'
            gen.NB_UNITS = 3
            gen.populate_entity(force_populate=True)

        unit_names = [
            ('Oficina Principal La Vega', 'LVG'),
            ('Sucursal Santiago', 'STI'),
            ('Centro Santo Domingo', 'SDQ'),
        ]
        for unit, data in zip(entity.entityunitmodel_set.all().order_by('created'), unit_names):
            unit.name = data[0]
            unit.document_prefix = data[1]
            unit.save()

        bank_names = [
            ('Banco Popular Dominicano - Operaciones', 'Banco Popular Dominicano'),
            ('Banreservas - Ahorros Institucional', 'Banreservas'),
            ('BHD - Caja Chica / Tesorería', 'Banco BHD'),
        ]
        for acct, data in zip(entity.bankaccountmodel_set.all().order_by('created'), bank_names):
            acct.name = data[0]
            acct.financial_institution = data[1]
            acct.active = True
            acct.save()

        rd_vendors = [
            ('Edesur Dominicana', 'Santo Domingo', 'Distrito Nacional'),
            ('Claro Dominicana', 'Santo Domingo', 'Distrito Nacional'),
            ('Altice Dominicana', 'Santo Domingo', 'Distrito Nacional'),
            ('Office Depot RD', 'Santiago', 'Santiago'),
            ('Papelería La Vega', 'La Vega', 'La Vega'),
            ('Supermercados Bravo', 'Santo Domingo', 'Distrito Nacional'),
        ]
        for vendor, data in zip(entity.vendormodel_set.all().order_by('created'), rd_vendors):
            vendor.vendor_name = data[0]
            vendor.city = data[1]
            vendor.state = data[2]
            vendor.country = 'DO'
            vendor.phone = '8095550000'
            vendor.save()

        rd_customers = [
            ('José Manuel Pérez', 'La Vega', 'La Vega'),
            ('María Altagracia Rodríguez', 'Santiago', 'Santiago'),
            ('Ana Carolina Gómez', 'Santo Domingo', 'Distrito Nacional'),
            ('Luis Alberto Martínez', 'San Francisco de Macorís', 'Duarte'),
            ('Yolanda Fernández', 'Moca', 'Espaillat'),
            ('Rafael de Jesús Rosario', 'Bonao', 'Monseñor Nouel'),
        ]
        for customer, data in zip(entity.customermodel_set.all().order_by('created'), rd_customers):
            customer.customer_name = data[0]
            customer.city = data[1]
            customer.state = data[2]
            customer.country = 'DO'
            customer.phone = '8095551111'
            customer.save()

        accounts = list(entity.get_coa_accounts(order_by=('code',)))

        def first_role(role):
            for acc in accounts:
                if acc.role == role:
                    return acc
            return None

        rename_map = {
            ASSET_CA_CASH: 'Caja y Bancos RD$',
            ASSET_CA_RECEIVABLES: 'Cartera de Créditos a Socios',
            LIABILITY_CL_OTHER: 'Depósitos y Ahorros de Socios',
            LIABILITY_CL_ACC_PAYABLE: 'Cuentas por Pagar Proveedores',
            EQUITY_CAPITAL: 'Aportaciones de Socios',
            INCOME_INTEREST: 'Ingresos por Intereses sobre Préstamos',
            EXPENSE_OPERATIONAL: 'Gastos Administrativos y Operativos',
        }
        seen = set()
        for acc in accounts:
            if acc.role in rename_map and acc.role not in seen:
                acc.name = rename_map[acc.role]
                acc.save(update_fields=['name', 'updated'])
                seen.add(acc.role)

        cash_acc = first_role(ASSET_CA_CASH)
        loans_acc = first_role(ASSET_CA_RECEIVABLES)
        savings_acc = first_role(LIABILITY_CL_OTHER)
        payable_acc = first_role(LIABILITY_CL_ACC_PAYABLE)
        capital_acc = first_role(EQUITY_CAPITAL)
        interest_income_acc = first_role(INCOME_INTEREST)
        opex_acc = first_role(EXPENSE_OPERATIONAL)

        manual_ledger_name = 'Operaciones Cooperativa RD'
        manual_ledger = entity.ledgermodel_set.filter(name=manual_ledger_name).first()
        if not manual_ledger:
            manual_ledger = entity.create_ledger(name=manual_ledger_name, posted=False, commit=True)

            tx_sets = []
            if cash_acc and capital_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=160),
                    'desc': 'Aportes iniciales de socios fundadores',
                    'txs': [
                        {'account': cash_acc, 'amount': Decimal('1250000.00'), 'tx_type': DEBIT, 'description': 'Ingreso de aportaciones en caja y bancos'},
                        {'account': capital_acc, 'amount': Decimal('1250000.00'), 'tx_type': CREDIT, 'description': 'Registro de aportaciones sociales'},
                    ]
                })
            if cash_acc and savings_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=145),
                    'desc': 'Captaciones de ahorros de socios',
                    'txs': [
                        {'account': cash_acc, 'amount': Decimal('780000.00'), 'tx_type': DEBIT, 'description': 'Entrada de efectivo por depósitos de ahorro'},
                        {'account': savings_acc, 'amount': Decimal('780000.00'), 'tx_type': CREDIT, 'description': 'Obligación por ahorros de socios'},
                    ]
                })
            if cash_acc and loans_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=120),
                    'desc': 'Desembolso de cartera de créditos a socios',
                    'txs': [
                        {'account': loans_acc, 'amount': Decimal('900000.00'), 'tx_type': DEBIT, 'description': 'Préstamos desembolsados a socios'},
                        {'account': cash_acc, 'amount': Decimal('900000.00'), 'tx_type': CREDIT, 'description': 'Salida de banco por desembolsos'},
                    ]
                })
            if cash_acc and loans_acc and interest_income_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=75),
                    'desc': 'Cobro de cuotas e intereses de préstamos',
                    'txs': [
                        {'account': cash_acc, 'amount': Decimal('125000.00'), 'tx_type': DEBIT, 'description': 'Cobro recibido en caja y bancos'},
                        {'account': loans_acc, 'amount': Decimal('95000.00'), 'tx_type': CREDIT, 'description': 'Abono a principal de cartera'},
                        {'account': interest_income_acc, 'amount': Decimal('30000.00'), 'tx_type': CREDIT, 'description': 'Ingreso por intereses cobrados'},
                    ]
                })
            if opex_acc and cash_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=40),
                    'desc': 'Pago de gastos administrativos y operativos',
                    'txs': [
                        {'account': opex_acc, 'amount': Decimal('18500.00'), 'tx_type': DEBIT, 'description': 'Servicios, papelería y gastos menores'},
                        {'account': cash_acc, 'amount': Decimal('18500.00'), 'tx_type': CREDIT, 'description': 'Salida de efectivo por gastos operativos'},
                    ]
                })
            if opex_acc and payable_acc:
                tx_sets.append({
                    'date': timezone.now() - timedelta(days=20),
                    'desc': 'Registro de factura pendiente a proveedor local',
                    'txs': [
                        {'account': opex_acc, 'amount': Decimal('42000.00'), 'tx_type': DEBIT, 'description': 'Gasto por mantenimiento y utilidades'},
                        {'account': payable_acc, 'amount': Decimal('42000.00'), 'tx_type': CREDIT, 'description': 'Cuenta por pagar a suplidor'},
                    ]
                })

            for entry in tx_sets:
                entity.commit_txs(
                    je_timestamp=entry['date'],
                    je_txs=entry['txs'],
                    je_posted=True,
                    je_ledger_model=manual_ledger,
                    je_desc=entry['desc'],
                    je_origin='seed-rd-coop-demo',
                )

        print({'entity': entity.name, 'transactions': TransactionModel.objects.for_entity(entity_model=entity).count(), 'ledger': manual_ledger_name})
        PY
        python /tmp/seed_rd_demo.py
        python manage.py runserver 0.0.0.0:8000

volumes:
  django_ledger_starter_app:
