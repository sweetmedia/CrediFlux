services:
  web:
    image: python:3.11-slim
    container_name: django-ledger-web
    restart: unless-stopped
    ports:
      - "3640:8000"
    volumes:
      - django_ledger_app:/app
    command: >
      sh -lc "
        set -e &&
        apt-get update && apt-get install -y --no-install-recommends git gcc build-essential && rm -rf /var/lib/apt/lists/* &&
        if [ ! -f /app/manage.py ]; then git clone --depth 1 https://github.com/arrobalytics/django-ledger.git /app; fi &&
        cd /app &&
        pip install --no-cache-dir -U pip &&
        pip install --no-cache-dir . django-debug-toolbar &&
        python -c \"from pathlib import Path; p=Path('dev_env/settings.py'); s=p.read_text(); s=s.replace(\"ALLOWED_HOSTS = ['127.0.0.1', '192.168.1.102', 'localhost']\", \"ALLOWED_HOSTS = ['*']\"); s=s.replace(\"CACHES = {\\n    'default': {\\n        'BACKEND': 'django.core.cache.backends.redis.RedisCache',\\n        'LOCATION': 'redis://127.0.0.1:6379',\\n    }\\n}\", \"CACHES = {'default': {'BACKEND': 'django.core.cache.backends.locmem.LocMemCache'}}\"); p.write_text(s)\" &&
        python manage.py migrate &&
        python manage.py shell -c \"from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username='demoadmin').exists() or U.objects.create_superuser('demoadmin','demo@example.com','demo2026')\" &&
        python manage.py runserver 0.0.0.0:8000
      "

volumes:
  django_ledger_app:
